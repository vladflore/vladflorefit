<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-1Q5PTQ3F7Y"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-1Q5PTQ3F7Y");
    </script>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>vladflore.fit</title>
    <style>
      body,
      html {
        height: 100%;
        background: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 1)),
          url("logo.jpeg") center center / cover no-repeat;
        /* Must come after the shorthand — shorthand resets background-color to transparent */
        background-color: #000;
      }

      .center-container {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        /* Top/side padding + bottom padding clears the fixed BMC button */
        padding: 1.5rem 1rem calc(1.5rem + 64px);
      }

      .tiles-container {
        width: 100%;
        max-width: 480px;
        display: flex;
        flex-direction: row;
        gap: 1.5rem;
        justify-content: center;
        align-items: center;
      }

      .tile {
        /* Fluid square: scales smoothly between 150px and 200px */
        width: clamp(150px, 38vw, 200px);
        height: clamp(150px, 38vw, 200px);
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: transform 0.18s, box-shadow 0.18s;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.18);
        color: #fff;
        border: 2px solid #dee2e6;
        border-radius: 1rem;
        text-decoration: none;
        background: linear-gradient(
          180deg,
          rgba(186, 148, 94, 0.95) 0%,
          rgba(186, 148, 94, 0.65) 100%
        );
        padding: 0.75rem;
      }

      .tile:hover {
        transform: translateY(-6px) scale(1.04);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.22);
        text-decoration: none;
        color: inherit;
      }

      .tile-icon {
        font-size: clamp(1.5rem, 4.5vw, 2rem);
        margin-bottom: 0.3rem;
        line-height: 1;
      }

      .tile-title {
        font-size: clamp(0.85rem, 2.2vw, 1rem);
        font-weight: 700;
        text-align: center;
        margin-bottom: 0.2rem;
        letter-spacing: 0.04em;
        line-height: 1.2;
      }

      .tile-description {
        font-size: clamp(0.68rem, 1.7vw, 0.78rem);
        color: rgba(255, 255, 255, 0.82);
        font-weight: 400;
        letter-spacing: 0.01em;
        text-align: center;
        line-height: 1.35;
        margin: 0.15rem 0;
      }

      .tile-note {
        font-size: clamp(0.6rem, 1.4vw, 0.68rem);
        color: rgba(255, 255, 255, 0.55);
        text-align: center;
        margin: 0.15rem 0;
        line-height: 1.3;
      }

      /* Portrait mobile — stack tiles and scale with viewport width */
      @media (max-width: 480px) {
        .tiles-container {
          flex-direction: column;
          gap: 1rem;
        }

        .tile {
          width: min(260px, 78vw);
          height: min(260px, 78vw);
        }

        .tile-icon {
          font-size: clamp(1.8rem, 10vw, 2.5rem);
        }

        .tile-title {
          font-size: clamp(1rem, 5.5vw, 1.15rem);
        }

        .tile-description {
          font-size: clamp(0.8rem, 4vw, 0.92rem);
        }

        .tile-note {
          font-size: clamp(0.7rem, 3.5vw, 0.8rem);
        }

        .tile:hover {
          transform: translateY(-3px) scale(1.02);
        }
      }

      /* Short landscape — keep side by side but shrink tiles to fit height */
      @media (max-height: 500px) and (orientation: landscape) {
        .center-container {
          padding: 0.5rem 1rem calc(0.5rem + 64px);
        }

        .tiles-container {
          flex-direction: row;
          gap: 1rem;
        }

        .tile {
          width: clamp(110px, 24vw, 150px);
          height: clamp(110px, 24vw, 150px);
          padding: 0.5rem;
        }
      }

    </style>
    <link rel="icon" type="image/png" href="favicon.jpeg" />
  </head>
  <body>
    <script>
      if (window.location.hash.includes("access_token")) {
        window.location.replace('/flexary/index.html' + window.location.search + window.location.hash);
      }
    </script>
    <div class="center-container">
      <div class="tiles-container">
        <a
          href="./flexary/index.html"
          target="_blank"
          rel="noopener noreferrer"
          class="tile"
        >
          <div class="tile-icon">
            <span>🏋️</span>
          </div>
          <div class="tile-title">Flexary</div>
          <div class="tile-description">
            A compendium of fitness exercises.
          </div>
        </a>
        <a
          href="./scheduler/index.html"
          target="_blank"
          rel="noopener noreferrer"
          class="tile"
        >
          <div class="tile-icon">
            <span>📅</span>
          </div>
          <div class="tile-title">Schedulizr</div>
          <div class="tile-description">
            Your simple solution for effortless class scheduling.
          </div>
          <div class="tile-note">
            Optimized for portrait orientation screens.
          </div>
        </a>
      </div>
    </div>
    <div
      style="
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: flex-end;
        position: fixed;
        left: 0;
        bottom: 0;
        z-index: 10;
        background-color: #000;
        padding-bottom: 16px;
        padding-bottom: calc(16px + env(safe-area-inset-bottom));
      "
    >
      <script
        type="text/javascript"
        src="https://cdnjs.buymeacoffee.com/1.0.0/button.prod.min.js"
        data-name="bmc-button"
        data-slug="vladflorefit"
        data-color="#ba945e"
        data-emoji="☕"
        data-font="Bree"
        data-text="Support this project"
        data-outline-color="#000000"
        data-font-color="#000000"
        data-coffee-color="#FFDD00"
      ></script>
    </div>
  </body>
</html>
