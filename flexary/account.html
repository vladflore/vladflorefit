<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="description" content="Manage your Flexary account and workout history." />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
    <link
      rel="stylesheet"
      href="https://pyscript.net/releases/2024.1.1/core.css"
    />
    <link
      href="./assets/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="./assets/css/base.css" />
    <link rel="stylesheet" href="./assets/css/index.css" />
    <link rel="stylesheet" href="./assets/css/account.css" />
    <script
      type="module"
      src="https://pyscript.net/releases/2024.1.1/core.js"
    ></script>
    <script type="module" src="./src/js/auth.js"></script>
    <script type="module" src="./src/js/loading.js"></script>
    <title>Account — Flexary</title>
    <link rel="icon" type="image/png" href="./assets/favicon.jpeg" />
  </head>

  <body class="account-page">
    <dialog id="loading">
      <img src="./assets/logo-nobg.webp" class="logo pulsate" alt="Loading..." />
    </dialog>

    <nav class="navbar sticky-top site-nav">
      <div class="site-nav-inner">
        <div class="site-nav-brand">
          <a href="index.html">
            <img src="./assets/logo-nobg.webp" class="logo-header" alt="Logo" />
          </a>
          <span class="site-nav-title">Flexary</span>
        </div>
        <div></div>
        <div class="site-nav-actions">
          <a href="index.html" class="btn btn-outline-gold btn-sm">
            <i class="bi bi-arrow-left me-1"></i>
            <span data-i18n="library_link">Library</span>
          </a>
        </div>
      </div>
    </nav>

    <main>
      <div id="container" class="account-container d-none">
        <h4 class="account-page-title" data-i18n="account">Account</h4>
        <div class="account-card">
          <div class="account-card-row">
            <span class="account-card-label" data-i18n="email_label">Email</span>
            <strong id="account-email">–</strong>
          </div>
          <div class="account-card-row">
            <span class="account-card-label" data-i18n="account_user_id">User ID</span>
            <code id="account-user-id">–</code>
          </div>
        </div>
        <button
          type="button"
          class="btn btn-outline-gold btn-sm account-signout-btn"
          py-click="sign_out"
          data-i18n="log_out"
          data-i18n-title="log_out"
          title="Log out"
        >
          <i class="bi bi-box-arrow-right me-1"></i>Log out
        </button>
      </div>
    </main>

    <script type="py" src="./src/py/account.py" config="./pyscript-account.toml"></script>
  </body>
</html>
