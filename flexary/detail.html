<!DOCTYPE html>

<html>
  <head>
    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-1Q5PTQ3F7Y"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-1Q5PTQ3F7Y");
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://pyscript.net/releases/2024.1.1/core.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="./assets/css/examples.css" />
    <script
      type="module"
      src="https://pyscript.net/releases/2024.1.1/core.js"
    ></script>
    <script type="module">
      const loading = document.getElementById("loading");
      const container = document.getElementById("container");
      addEventListener("py:ready", () => {
        loading.close();
        container.classList.remove("d-none");
      });
      loading.showModal();
    </script>
    <title>Fitness Exercises Library</title>
    <link rel="icon" type="image/png" href="./assets/favicon.jpeg" />
  </head>

  <body>
    <dialog id="loading">
      <img src="./assets/logo-nobg.png" class="logo pulsate" alt="Loading..." />
    </dialog>

    <nav
      class="navbar sticky-top py-1"
      style="background-color: #000000; min-height: 60px"
    >
      <div
        class="container-fluid d-flex align-items-center justify-content-between"
      >
        <a href="index.html">
          <img src="./assets/logo.jpeg" class="logo-header" alt="Logo" />
        </a>
      </div>
    </nav>

    <section class="pyscript">
      <main>
        <section>
          <div id="container" class="container py-3 d-none">
            <nav aria-label="breadcrumb" class="mb-3">
              <ol class="breadcrumb mb-0">
                <li class="breadcrumb-item">
                  <a href="index.html" class="back-link"><i class="bi bi-house me-1"></i>Library</a>
                </li>
                <li class="breadcrumb-item active" aria-current="page">
                  <span id="breadcrumb-exercise-name"></span>
                </li>
              </ol>
            </nav>
            <div class="text-center mb-3">
              <h2 id="exercise-name" class="mb-3 text-center"></h2>
            </div>
            <div
              id="badges-container"
              class="badge-group mb-4 d-flex justify-content-center"
            >
              <span id="category-badge" class="badge me-1"></span>
              <span id="body-parts-badge" class="badge"></span>
            </div>
            <div class="row g-4">
              <div class="col-md-7">
                <div class="ratio ratio-16x9">
                  <iframe
                    id="exercise-video"
                    src=""
                    title="YouTube video player"
                    frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen
                  ></iframe>
                </div>
              </div>
              <div class="col-md-4">
                <div class="detail-card h-100">
                  <h5 class="detail-card-title">
                    <i class="bi bi-list-ul me-2"></i>Instructions
                  </h5>
                  <p id="exercise-instructions" class="mb-0"></p>
                </div>
              </div>
            </div>
            <div class="row g-4 mt-1">
              <div class="col-md-4">
                <div class="detail-card h-100">
                  <h5 class="detail-card-title">
                    <i class="bi bi-person-arms-up me-2"></i>Targeted Muscles
                  </h5>
                  <p id="primary-muscles" class="mb-1 text-sm-start"></p>
                  <p id="secondary-muscles" class="mb-0 text-sm-start" style="opacity: 0.7"></p>
                </div>
              </div>
              <div class="col-md-4">
                <div class="detail-card h-100">
                  <h5 class="detail-card-title">
                    <i class="bi bi-lightbulb me-2"></i>Key Cues
                  </h5>
                  <ul id="key-cues-container" class="detail-list d-none">
                    <li id="key-cue"></li>
                  </ul>
                  <span id="cues-not-available" class="detail-not-available d-none">Not available</span>
                </div>
              </div>
              <div class="col-md-4">
                <div class="detail-card h-100">
                  <h5 class="detail-card-title">
                    <i class="bi bi-arrow-left-right me-2"></i>Alternative Exercises
                  </h5>
                  <ul id="alt-ex-container" class="detail-list d-none">
                    <li id="alt-ex" class="alt-ex-link" style="cursor: pointer"></li>
                  </ul>
                  <span id="alt-not-available" class="detail-not-available d-none">Not available</span>
                </div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </section>
    <footer id="footer" class="bg-dark text-white d-none py-2 mt-auto">
      <div class="container d-flex justify-content-center align-items-center">
        <div class="text-center w-100">
          <p id="copyright" class="mb-1" style="font-size: 0.875rem"></p>
          <p id="version" class="mb-0" style="font-size: 0.875rem"></p>
        </div>
      </div>
    </footer>
    <style>
      body {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        margin: 0;
      }
      main {
        flex: 1;
      }
    </style>
    <script type="py" src="./src/py/detail.py" config="./pyscript.toml"></script>
  </body>
</html>
