<!DOCTYPE html>

<html lang="en">
  <head>
    <script>
      if (location.hostname !== "localhost" && location.hostname !== "127.0.0.1") {
        var s = document.createElement("script");
        s.async = true;
        s.src = "https://www.googletagmanager.com/gtag/js?id=G-1Q5PTQ3F7Y";
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag("js", new Date());
        gtag("config", "G-1Q5PTQ3F7Y");
      }
    </script>
    <meta charset="UTF-8" />
    <meta name="description" content="Exercise details, step-by-step instructions, and video guide — Flexary exercise library." />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://pyscript.net/releases/2024.1.1/core.css"
    />
    <link
      href="./assets/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="./assets/css/base.css" />
    <link rel="stylesheet" href="./assets/css/detail.css" />
    <script
      type="module"
      src="https://pyscript.net/releases/2024.1.1/core.js"
    ></script>
    <script type="module" src="./src/js/detail.js"></script>
    <title>Fitness Exercises Library</title>
    <link rel="icon" type="image/png" href="./assets/favicon.jpeg" />
  </head>

  <body>
    <dialog id="loading">
      <img src="./assets/logo-nobg.webp" class="logo pulsate" alt="Loading..." />
    </dialog>

    <nav class="navbar sticky-top site-nav flex-wrap">
      <div class="site-nav-inner">
        <div class="site-nav-brand">
          <a href="index.html">
            <img src="./assets/logo-nobg.webp" class="logo-header" alt="Logo" />
          </a>
          <a href="index.html" class="site-nav-title">Flexary</a>
        </div>
      </div>
    </nav>

    <section class="pyscript">
      <main>
        <section>
          <div id="container" class="container py-3 d-none">
            <div class="detail-sticky-top">
              <nav aria-label="breadcrumb" class="mb-2">
                <ol class="breadcrumb mb-0">
                  <li class="breadcrumb-item">
                    <a href="index.html" class="back-link"><i class="bi bi-house me-1"></i><span data-i18n="library_link">Library</span></a>
                  </li>
                  <li class="breadcrumb-item active" aria-current="page">
                    <span id="breadcrumb-exercise-name"></span>
                  </li>
                </ol>
              </nav>
              <div class="detail-hero">
                <h2 id="exercise-name" class="detail-exercise-name mb-3"></h2>
                <div id="badges-container" class="badge-group justify-content-center">
                  <span id="category-badge" class="badge me-1"></span>
                  <span id="body-parts-badge" class="badge me-1"></span>
                </div>
              </div>
            </div>
            <div class="row g-4">
              <div class="col-md-7 d-flex flex-column gap-4">
                <div class="detail-video-wrap ratio ratio-16x9">
                  <iframe
                    id="exercise-video"
                    src=""
                    title="YouTube video player"
                    frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen
                  ></iframe>
                </div>
                <div class="row g-4">
                  <div class="col-6">
                    <div class="detail-card h-100">
                      <h3 class="detail-card-title">
                        <i class="bi bi-bullseye me-2"></i><span data-i18n="targeted_muscles_title">Targeted Muscles</span>
                      </h3>
                      <div id="primary-muscles-section" class="muscles-section d-none">
                        <span class="muscles-label" data-i18n="primary_label_short">Primary</span>
                        <div id="primary-muscles-chips" class="muscles-chips"></div>
                      </div>
                      <div id="secondary-muscles-section" class="muscles-section d-none">
                        <span class="muscles-label muscles-label--secondary" data-i18n="secondary_label_short">Secondary</span>
                        <div id="secondary-muscles-chips" class="muscles-chips"></div>
                      </div>
                      <span id="muscles-not-available" class="detail-not-available d-none" data-i18n="not_available">Not available</span>
                    </div>
                  </div>
                  <div class="col-6">
                    <div class="detail-card h-100">
                      <h3 class="detail-card-title">
                        <i class="bi bi-arrow-left-right me-2"></i><span data-i18n="alternatives_title">Alternative Exercises</span>
                      </h3>
                      <ul id="alt-ex-container" class="detail-list d-none">
                        <li id="alt-ex" class="alt-ex-link" style="cursor: pointer"></li>
                      </ul>
                      <span id="alt-not-available" class="detail-not-available d-none" data-i18n="not_available">Not available</span>
                    </div>
                  </div>
                </div>
              </div>
              <div class="col-md-5 d-flex flex-column gap-4">
                <div class="detail-card">
                  <h3 class="detail-card-title">
                    <i class="bi bi-list-ul me-2"></i><span data-i18n="instructions_title">Instructions</span>
                  </h3>
                  <p id="exercise-instructions" class="mb-0"></p>
                  <span id="instructions-not-available" class="detail-not-available d-none" data-i18n="not_available">Not available</span>
                </div>
                <div class="detail-card">
                  <h3 class="detail-card-title">
                    <i class="bi bi-lightbulb me-2"></i><span data-i18n="key_cues_title">Key Cues</span>
                  </h3>
                  <ul id="key-cues-container" class="detail-list d-none">
                    <li id="key-cue"></li>
                  </ul>
                  <span id="cues-not-available" class="detail-not-available d-none" data-i18n="not_available">Not available</span>
                </div>
                <div class="detail-card">
                  <h3 class="detail-card-title">
                    <i class="bi bi-lightning-fill me-2"></i><span data-i18n="equipment_title">Equipment</span>
                  </h3>
                  <ul id="equipment-container" class="detail-list d-none">
                    <li id="equipment-item"></li>
                  </ul>
                  <span id="equipment-not-available" class="detail-not-available d-none" data-i18n="bodyweight">Bodyweight — no equipment needed</span>
                </div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </section>
    <footer id="footer" class="site-footer d-none mt-auto">
      <div class="site-footer-inner">
        <span class="site-footer-divider">✦</span>
        <p id="copyright" class="site-footer-text mb-0"></p>
        <p id="version" class="site-footer-version mb-0"></p>
      </div>
    </footer>
    <script type="py" src="./src/py/detail.py" config="./pyscript.toml"></script>
  </body>
</html>
